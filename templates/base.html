<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Office Hours Optimizer</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body data-theme="default">
  <header class="site-header">
    <div class="container">
      <h1>Office Hours Optimizer</h1>
      <nav>
        <button id="viewport-toggle" class="viewport-toggle" title="Toggle between mobile and desktop view">
          <span class="viewport-icon">📱</span>
        </button>
        <div class="nav-dropdown">
          <button class="dropdown-toggle">Navigation</button>
          <div class="dropdown-menu">
            <a href="{{ url_for('student_page') }}" class="dropdown-item">Student Page</a>
            <a href="{{ url_for('professor_page') }}" class="dropdown-item">Professor Page</a>
            <div class="dropdown-divider"></div>
            <p class="dropdown-label">Themes</p>
            <button data-theme="default" class="theme-option dropdown-item">Default (Blue)</button>
            <button data-theme="ocean" class="theme-option dropdown-item">Ocean (Teal)</button>
            <button data-theme="forest" class="theme-option dropdown-item">Forest (Green)</button>
            <button data-theme="sunset" class="theme-option dropdown-item">Sunset (Orange)</button>
            <button data-theme="royal" class="theme-option dropdown-item">Royal (Purple)</button>
          </div>
        </div>
      </nav>
    </div>
  </header>
  
  <script>
    // Viewport Toggle Logic
    function initializeViewportToggle() {
      const viewportToggle = document.getElementById('viewport-toggle');
      const htmlElement = document.documentElement;
      
      // Determine initial viewport
      function getInitialViewport() {
        const savedViewport = localStorage.getItem('forced-viewport');
        if (savedViewport) {
          return savedViewport;
        }
        // Auto-detect based on screen size
        return window.innerWidth < 768 ? 'mobile' : 'desktop';
      }
      
      // Set initial viewport
      const initialViewport = getInitialViewport();
      htmlElement.setAttribute('data-viewport', initialViewport);
      updateViewportButton(initialViewport);
      
      // Handle window resize (for auto-detection when not forced)
      window.addEventListener('resize', function() {
        const savedViewport = localStorage.getItem('forced-viewport');
        if (!savedViewport) {
          const newViewport = window.innerWidth < 768 ? 'mobile' : 'desktop';
          htmlElement.setAttribute('data-viewport', newViewport);
          updateViewportButton(newViewport);
        }
      });
      
      // Toggle button click
      viewportToggle.addEventListener('click', function(e) {
        e.preventDefault();
        const currentViewport = htmlElement.getAttribute('data-viewport');
        const newViewport = currentViewport === 'mobile' ? 'desktop' : 'mobile';
        
        htmlElement.setAttribute('data-viewport', newViewport);
        localStorage.setItem('forced-viewport', newViewport);
        updateViewportButton(newViewport);
      });
      
      function updateViewportButton(viewport) {
        const icon = viewportToggle.querySelector('.viewport-icon');
        viewportToggle.setAttribute('title', 
          viewport === 'mobile' 
            ? 'Currently in Mobile View - Click to switch to Desktop' 
            : 'Currently in Desktop View - Click to switch to Mobile'
        );
        icon.textContent = viewport === 'mobile' ? '📱' : '🖥️';
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      initializeViewportToggle();
      
      const dropdown = document.querySelector('.nav-dropdown');
      const toggle = document.querySelector('.dropdown-toggle');
      const menu = document.querySelector('.dropdown-menu');
      const themeOptions = document.querySelectorAll('.theme-option');
      const body = document.body;
      
      // Load saved theme
      const savedTheme = localStorage.getItem('site-theme') || 'default';
      body.setAttribute('data-theme', savedTheme);
      updateThemeButton(savedTheme);
      
      toggle.addEventListener('click', function() {
        menu.classList.toggle('active');
      });
      
      document.addEventListener('click', function(event) {
        if (!dropdown.contains(event.target)) {
          menu.classList.remove('active');
        }
      });
      
      // Theme switching
      themeOptions.forEach(option => {
        option.addEventListener('click', function(e) {
          e.preventDefault();
          const theme = this.getAttribute('data-theme');
          body.setAttribute('data-theme', theme);
          localStorage.setItem('site-theme', theme);
          updateThemeButton(theme);
        });
      });
      
      function updateThemeButton(activeTheme) {
        themeOptions.forEach(option => {
          option.classList.remove('active');
          if (option.getAttribute('data-theme') === activeTheme) {
            option.classList.add('active');
          }
        });
      }
    });
  </script>

  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <section class="messages">
          {% for category, message in messages %}
            <p class="message {{ category }}">{{ message }}</p>
          {% endfor %}
        </section>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
